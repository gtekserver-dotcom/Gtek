<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Tek Store</title>
<style>

body{
font-family:Arial;
margin:0;
}

@media (max-width:768px){

body{
font-size:18px;
}

nav{
flex-direction:column;
}

.hero{
padding:40px 20px;
}

}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

.logo{
display:flex;
align-items:center;
}

.logo img{
width:90px;
margin-right:15px;
}

.container{
display:flex;
}

/* sidebar */

.sidebar{
width:200px;
background:#f4f4f4;
padding:15px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:10px;
cursor:pointer;
border-bottom:1px solid #ddd;
}

.sidebar li:hover{
background:#ddd;
}

/* products area */

.products{
flex:1;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

/* product card */

.product{
width:200px;
border:1px solid #ccc;
padding:10px;
text-align:center;
}

.product img{
width:100%;
}

button{
background:#28a745;
color:white;
border:none;
padding:8px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
	<div class="logo">
<img src="logo.png" alt="logo">
<h2><span style="color:blue">G</span><span style="color:yellow">-</span><span style="color:red">T</span><span style="color:silver">e</span><span  style="color:lime">K</span> Software Services store</h2></header>
	</div

>
<div class="container">

<!-- SIDE MENU -->
<div class="sidebar">

<h3>Categories</h3>

<ul>
<li onclick="showCategory('phones')">Phones</li>
<li onclick="showCategory('computers')">Computers</li>
<li onclick="showCategory('electronics')">Electronics</li>
<li onclick="showCategory('accessories')">Accessories</li>
<li onclick="showCategory('clothes')">Clothes</li>
<li onclick="showCategory('shoes')">Shoes</li>
<li onclick="showCategory('jewelry')">Jewelry</li>
</ul>

</div>

<!-- PRODUCT AREA -->
<div class="products" id="products">

<h3>Select a category to view products</h3>

</div>

</div>

<script src="store.js"></script>

</body>
</html>
